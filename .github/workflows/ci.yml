name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            meson \
            ninja-build \
            pkg-config \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev

      - name: Install gtk4-layer-shell
        run: |
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell -Dexamples=false -Ddocs=false -Dtests=false
          meson compile -C /tmp/gtk4-layer-shell/build
          sudo meson install -C /tmp/gtk4-layer-shell/build
          sudo ldconfig

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --workspace
